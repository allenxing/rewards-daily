<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>愿望管理 — 成长星球</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.admin-layout { display: flex; min-height: 100vh; }

.sidebar {
  width: var(--sidebar-width); height: 100vh;
  position: fixed; top: 0; left: 0;
  background: var(--white);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  z-index: 50; transition: transform 250ms ease;
}

.sidebar-logo {
  padding: 20px 20px 16px;
  display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid var(--border);
}

.sidebar-logo-icon {
  width: 36px; height: 36px;
  background: var(--primary); border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: white; font-size: 0.95rem;
}

.sidebar-logo-text { font-family: var(--font-display); font-weight: 600; font-size: 1rem; }
.sidebar-nav { flex: 1; padding: 12px; overflow-y: auto; }

.nav-link {
  display: flex; align-items: center; gap: 10px;
  padding: 0 14px; height: 44px;
  border-radius: var(--radius-md);
  font-size: 0.875rem; font-weight: 500;
  color: var(--text-secondary);
  transition: all var(--transition-fast);
  cursor: pointer; border: none; background: none;
  width: 100%; text-align: left; font-family: var(--font-body);
}

.nav-link:hover { background: var(--surface); color: var(--text); }
.nav-link.active {
  background: rgba(93,68,50,0.06); color: var(--primary); font-weight: 600;
  position: relative;
}

.nav-link.active::before {
  content: ''; position: absolute; left: 0; top: 8px; bottom: 8px;
  width: 3px; background: var(--primary); border-radius: 0 3px 3px 0;
}

.nav-link-icon {
  width: 20px; height: 20px;
  display: flex; align-items: center; justify-content: center; font-size: 1rem;
}

.sidebar-footer { padding: 12px; border-top: 1px solid var(--border); }

.logout-btn {
  display: flex; align-items: center; gap: 10px;
  padding: 0 14px; height: 44px;
  border-radius: var(--radius-md);
  font-size: 0.875rem; font-weight: 500;
  color: var(--text-secondary);
  width: 100%; border: none; background: none;
  cursor: pointer; font-family: var(--font-body);
  transition: all var(--transition-fast);
}

.logout-btn:hover { background: rgba(220,38,38,0.06); color: var(--danger); }

.main-content {
  flex: 1; margin-left: var(--sidebar-width);
  min-height: 100vh; background: var(--surface);
}

.page-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 24px 32px 0;
}

.page-title { font-size: 1.5rem; font-weight: 600; }
.page-body { padding: 24px 32px 32px; }

.page-tabs {
  display: flex; gap: var(--space-4);
  border-bottom: 1.5px solid var(--border);
  margin-bottom: 24px;
}

.page-tab {
  padding: 10px 20px; font-size: 0.875rem; font-weight: 500;
  color: var(--text-secondary);
  border-bottom: 2px solid transparent;
  margin-bottom: -1.5px;
  transition: all var(--transition-fast);
  white-space: nowrap; cursor: pointer;
  background: none; border-top: none; border-left: none; border-right: none;
  font-family: var(--font-body);
}

.page-tab:hover { color: var(--text); }
.page-tab.active { color: var(--primary); border-bottom-color: var(--primary); }

/* Wish Grid */
.wish-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}

.wish-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: box-shadow var(--transition-normal);
}

.wish-card:hover { box-shadow: var(--shadow-md); }

.wish-image {
  height: 140px;
  background: var(--surface-alt);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 3rem;
}

.wish-body {
  padding: 16px 20px;
}

.wish-title {
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 8px;
}

.wish-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}

.wish-points {
  font-family: var(--font-mono);
  font-weight: 600;
  color: var(--primary);
}

.wish-owner {
  font-size: 0.8125rem;
  color: var(--text-secondary);
}

.wish-progress {
  height: 6px;
  background: var(--surface-alt);
  border-radius: 9999px;
  overflow: hidden;
  margin-bottom: 12px;
}

.wish-progress-bar {
  height: 100%;
  background: var(--primary);
  border-radius: 9999px;
  transition: width 300ms ease;
}

.wish-footer {
  display: flex;
  justify-content: flex-end;
  gap: 6px;
  padding: 0 20px 16px;
}

/* Mobile */
.mobile-menu-toggle {
  display: none;
  width: 40px; height: 40px;
  border-radius: var(--radius-md);
  border: 1px solid var(--border);
  background: var(--white);
  align-items: center; justify-content: center;
  cursor: pointer; font-size: 1.25rem;
}

.mobile-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.3); z-index: 45;
}

@media (max-width: 1023px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .main-content { margin-left: 0; }
  .mobile-menu-toggle { display: flex; }
  .mobile-overlay.active { display: block; }
  .page-header { padding: 16px 16px 0; }
  .page-body { padding: 16px; }
  .wish-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="admin-layout">
  <div class="mobile-overlay" id="mobileOverlay" onclick="closeSidebar()"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">&#9733;</div>
      <span class="sidebar-logo-text">成长星球</span>
    </div>
    <nav class="sidebar-nav">
      <a href="admin-dashboard.html" class="nav-link">
        <span class="nav-link-icon">&#128202;</span> 控制台首页
      </a>
      <a href="admin-tasks.html" class="nav-link">
        <span class="nav-link-icon">&#128203;</span> 任务管理
      </a>
      <a href="admin-wishes.html" class="nav-link active">
        <span class="nav-link-icon">&#127911;</span> 愿望管理
      </a>
      <a href="admin-children.html" class="nav-link">
        <span class="nav-link-icon">&#128118;</span> 孩子管理
      </a>
      <a href="admin-records.html" class="nav-link">
        <span class="nav-link-icon">&#128176;</span> 积分流水记录
      </a>
      <a href="admin-settings.html" class="nav-link">
        <span class="nav-link-icon">&#9881;&#65039;</span> 系统设置
      </a>
    </nav>
    <div class="sidebar-footer">
      <a href="index.html" class="logout-btn">
        <span class="nav-link-icon">&#128682;</span> 退出登录
      </a>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <div class="flex items-center gap-12">
        <button class="mobile-menu-toggle" onclick="toggleSidebar()">&#9776;</button>
        <h1 class="page-title">愿望管理</h1>
      </div>
      <button class="btn btn-primary btn-sm" onclick="openModal('wishModal')">&#10010; 新增愿望</button>
    </div>

    <div class="page-body">
      <div class="page-tabs">
        <button class="page-tab active" onclick="filterWishes('all', this)">全部愿望</button>
        <button class="page-tab" onclick="filterWishes('personal', this)">个人愿望</button>
        <button class="page-tab" onclick="filterWishes('family', this)">家庭愿望</button>
      </div>

      <div class="wish-grid" id="wishList">
        <!-- Personal Wishes -->
        <div class="wish-card" data-type="personal">
          <div class="wish-image">&#127912;</div>
          <div class="wish-body">
            <div class="wish-title">画笔套装</div>
            <div class="wish-meta">
              <span class="wish-points">&#11088; 50 积分</span>
              <span class="wish-owner">小明</span>
            </div>
            <div class="wish-progress">
              <div class="wish-progress-bar" style="width:72%"></div>
            </div>
            <div style="font-size:0.8125rem;color:var(--text-secondary)">进度：36 / 50</div>
          </div>
          <div class="wish-footer">
            <button class="btn btn-ghost btn-sm" onclick="editWish('画笔套装', 50, 'personal')">&#9998; 编辑</button>
            <button class="btn btn-outline btn-sm">&#128274; 锁定</button>
            <button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="deleteWish(this)">&#128465;</button>
          </div>
        </div>

        <div class="wish-card" data-type="personal">
          <div class="wish-image">&#128640;</div>
          <div class="wish-body">
            <div class="wish-title">恐龙模型</div>
            <div class="wish-meta">
              <span class="wish-points">&#11088; 80 积分</span>
              <span class="wish-owner">小明</span>
            </div>
            <div class="wish-progress">
              <div class="wish-progress-bar" style="width:55%"></div>
            </div>
            <div style="font-size:0.8125rem;color:var(--text-secondary)">进度：44 / 80</div>
          </div>
          <div class="wish-footer">
            <button class="btn btn-ghost btn-sm" onclick="editWish('恐龙模型', 80, 'personal')">&#9998; 编辑</button>
            <button class="btn btn-outline btn-sm">&#128274; 锁定</button>
            <button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="deleteWish(this)">&#128465;</button>
          </div>
        </div>

        <div class="wish-card" data-type="personal">
          <div class="wish-image">&#127922;</div>
          <div class="wish-body">
            <div class="wish-title">小吉他</div>
            <div class="wish-meta">
              <span class="wish-points">&#11088; 100 积分</span>
              <span class="wish-owner">小红</span>
            </div>
            <div class="wish-progress">
              <div class="wish-progress-bar" style="width:40%"></div>
            </div>
            <div style="font-size:0.8125rem;color:var(--text-secondary)">进度：40 / 100</div>
          </div>
          <div class="wish-footer">
            <button class="btn btn-ghost btn-sm" onclick="editWish('小吉他', 100, 'personal')">&#9998; 编辑</button>
            <button class="btn btn-outline btn-sm">&#128274; 锁定</button>
            <button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="deleteWish(this)">&#128465;</button>
          </div>
        </div>

        <!-- Family Wishes -->
        <div class="wish-card" data-type="family">
          <div class="wish-image" style="background:linear-gradient(135deg,#FEF3C7,#FDE68A)">&#127752;</div>
          <div class="wish-body">
            <div class="wish-title">游乐园一日游</div>
            <div class="wish-meta">
              <span class="wish-points">&#11088; 200 积分</span>
              <span class="wish-owner">家庭</span>
            </div>
            <div class="wish-progress">
              <div class="wish-progress-bar" style="width:25%"></div>
            </div>
            <div style="font-size:0.8125rem;color:var(--text-secondary)">进度：50 / 200</div>
          </div>
          <div class="wish-footer">
            <button class="btn btn-ghost btn-sm" onclick="editWish('游乐园一日游', 200, 'family')">&#9998; 编辑</button>
            <button class="btn btn-outline btn-sm">&#128274; 锁定</button>
            <button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="deleteWish(this)">&#128465;</button>
          </div>
        </div>

        <div class="wish-card" data-type="family">
          <div class="wish-image" style="background:linear-gradient(135deg,#D1FAE5,#A7F3D0)">&#127860;</div>
          <div class="wish-body">
            <div class="wish-title">全家聚餐</div>
            <div class="wish-meta">
              <span class="wish-points">&#11088; 150 积分</span>
              <span class="wish-owner">家庭</span>
            </div>
            <div class="wish-progress">
              <div class="wish-progress-bar" style="width:60%"></div>
            </div>
            <div style="font-size:0.8125rem;color:var(--text-secondary)">进度：90 / 150</div>
          </div>
          <div class="wish-footer">
            <button class="btn btn-ghost btn-sm" onclick="editWish('全家聚餐', 150, 'family')">&#9998; 编辑</button>
            <button class="btn btn-outline btn-sm">&#128274; 锁定</button>
            <button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="deleteWish(this)">&#128465;</button>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Wish Modal -->
<div class="modal-overlay" id="wishModal">
  <div class="modal" style="max-width:480px">
    <div class="modal-header">
      <span class="modal-title" id="wishModalTitle">新增愿望</span>
      <button class="modal-close" onclick="closeModal('wishModal')">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">愿望配图</label>
        <div style="width:100%;height:120px;border:2px dashed var(--border);border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;color:var(--text-secondary);font-size:0.875rem;cursor:pointer;transition:border-color 150ms" onmouseover="this.style.borderColor='var(--primary)'" onmouseout="this.style.borderColor='var(--border)'">
          点击上传配图（可选）
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">愿望名称</label>
        <input type="text" class="form-input" id="wishName" placeholder="如：恐龙模型">
      </div>
      <div class="form-group">
        <label class="form-label">目标积分</label>
        <input type="number" class="form-input" id="wishPoints" placeholder="兑换需要的积分" min="1">
      </div>
      <div class="form-group">
        <label class="form-label">归属</label>
        <select class="form-input" id="wishOwner">
          <option value="personal">个人愿望</option>
          <option value="family">家庭愿望</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">归属孩子</label>
        <select class="form-input" id="wishChild">
          <option>小明</option>
          <option>小红</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('wishModal')">取消</button>
      <button class="btn btn-primary" onclick="saveWish()">保存</button>
    </div>
  </div>
</div>

<script>
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('mobileOverlay').classList.toggle('active');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('mobileOverlay').classList.remove('active');
}

function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

function filterWishes(type, btn) {
  document.querySelectorAll('.page-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.wish-card').forEach(card => {
    if (type === 'all') {
      card.style.display = '';
    } else {
      card.style.display = card.dataset.type === type ? '' : 'none';
    }
  });
}

function editWish(name, points, type) {
  document.getElementById('wishModalTitle').textContent = '编辑愿望';
  document.getElementById('wishName').value = name;
  document.getElementById('wishPoints').value = points;
  document.getElementById('wishOwner').value = type;
  openModal('wishModal');
}

function saveWish() {
  closeModal('wishModal');
  document.getElementById('wishModalTitle').textContent = '新增愿望';
}

function deleteWish(btn) {
  if (!confirm('确定删除此愿望？')) return;
  const card = btn.closest('.wish-card');
  card.style.opacity = '0.5';
  setTimeout(() => card.remove(), 300);
}

document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('active'); });
});
</script>

</body>
</html>
